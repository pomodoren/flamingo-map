name: Update map data

on:
  workflow_dispatch:

  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-map-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Download and validate spreadsheets
        #env:
        #  CITIES_CSV_URL: ${{ secrets.CITIES_CSV_URL }}
        #  PROTESTS_CSV_URL: ${{ secrets.PROTESTS_CSV_URL }}
        run: node scripts/update-data.mjs

      - name: Commit updated map data
        run: |
          git config user.name "flamingo-map-bot"
          git config user.email "flamingo-map-bot@users.noreply.github.com"

          git add data/locations.json

          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi

          git commit -m "Update map data"
          git push
