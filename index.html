<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Flamingo Map</title>

  <meta
    name="description"
    content="Interactive map showing protests by city."
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ol@10.9.0/ol.css"
  >

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="map-shell">
    
    <section class="map-content">
      <aside
        id="map-panel"
        class="map-panel"
        aria-label="Map filters"
      >
        <div class="panel-section">
          <label
            class="search-label"
            for="search"
          >
            Search
          </label>

          <div class="search-row">
            <input
              id="search"
              type="search"
              placeholder="Search city or protest"
              autocomplete="off"
            >

            <button
              id="clear-search"
              type="button"
            >
              Clear
            </button>
          </div>
        </div>

        <div class="panel-section">
          <h2>Protest status</h2>

          <label class="filter-option">
            <input
              class="status-filter"
              type="checkbox"
              value="planned"
              checked
            >
            Planned
          </label>

          <label class="filter-option">
            <input
              class="status-filter"
              type="checkbox"
              value="active"
              checked
            >
            Active
          </label>

          <label class="filter-option">
            <input
              class="status-filter"
              type="checkbox"
              value="completed"
              checked
            >
            Completed
          </label>
        </div>

        <div class="panel-section">
          <h2>Circle size</h2>

          <p class="panel-help">
            Larger circles represent cities where more protests have taken place.
          </p>

          <div class="circle-legend">
            <div class="circle-legend-item">
              <span class="circle-example circle-small">1</span>
              <span>1 protest</span>
            </div>

            <div class="circle-legend-item">
              <span class="circle-example circle-medium">5</span>
              <span>Several protests</span>
            </div>

            <div class="circle-legend-item">
              <span class="circle-example circle-large">15</span>
              <span>Many protests</span>
            </div>
          </div>
        </div>

        <div class="panel-section map-summary">
          <strong id="visible-count">0</strong>
          <span>cities visible</span>
        </div>
      </aside>

      <div class="map-wrapper">
        <div
          id="map"
          class="map"
          role="application"
          aria-label="Interactive protest map"
        ></div>

        <div
          id="map-message"
          class="map-message"
          hidden
          role="status"
        ></div>

        <div
          id="popup"
          class="ol-popup"
          hidden
        >
          <button
            id="popup-closer"
            class="popup-closer"
            type="button"
            aria-label="Close popup"
          >
            x
          </button>

          <div id="popup-content"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ol@10.9.0/dist/ol.js"></script>
  <script src="./map.js"></script>
</body>
</html>
